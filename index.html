<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CORP NETWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        html, body { height: 100%; overflow: hidden; background-color: #0c0204; }
        .chat-container { width: 100%; height: 100%; display: flex; flex-direction: column; background: linear-gradient(180deg, #16060a 0%, #080203 100%); }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #0c0204; padding: 8px 15px; font-size: 11px; color: #ff3344; border-bottom: 1px solid rgba(90, 20, 26, 0.5); font-weight: bold; flex-shrink: 0; }
        .status-right { display: flex; align-items: center; gap: 8px; }
        
        /* Header Dirapikan */
        .chat-header { padding: 12px 15px; border-bottom: 2px solid #5a141a; background: #110407; color: #ff3344; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { font-weight: bold; font-size: 16px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .lang-group { display: flex; gap: 5px; }
        .lang-btn { cursor: pointer; padding: 2px 8px; font-size: 10px; border: 1px solid #ff3344; background: transparent; color: #ff3344; border-radius: 4px; }
        .lang-btn.active { background: #ff3344; color: white; }

        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg {padding:10px 14px;max-width:94%;width:fit-content;font-size:14px;line-height:1.45;white-space:pre-line;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.25);animation:fade .25s ease;}
        @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .bot { align-self: flex-start; background: rgba(45, 35, 10, 0.6); border: 1px solid #ffcc33; color: #ffcc33; }
        .user { align-self: flex-end; background: rgba(0, 40, 50, 0.6); border: 1px solid #00ffff; color: #00ffff; }
        .chat-input { display: flex; padding: 15px; background: #110407; border-top: 2px solid #5a141a; gap: 10px; flex-shrink: 0; }
        input {flex:1;background:rgba(255,0,50,.05);border:1px solid #ff3344;color:#ff3344;padding:10px 14px;outline:none;border-radius:24px;}
        button { background: transparent; border: 1px solid #ff3344; color: #ff3344; padding: 0 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff3344; color: white; }
    </style>
</head>
<body>

<div class="chat-container" id="appContainer">
    <div class="status-bar">
        <div id="statusTime">00:00</div>
        <div class="status-right"><span>📶</span> <span>🔋</span> <span id="batteryStatus">Detecting...</span></div>
    </div>
    <div class="chat-header">
        <div class="header-title">NEXUS CORP <span style='font-size:9px;color:#63ff63'>●</span></div>
        <div class="lang-group">
            <button class="lang-btn active" onclick="changeLang('id', this)">ID</button>
            <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
        </div>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="msg bot" id="msgHalo">Halo lek! Ketik "menu" buat lihat daftar game & mulai order ya!</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
        <button id="btnKirim">➤</button>
    </div>
</div>

<script>
    const container = document.getElementById('appContainer');
    const chatBody = document.getElementById('chatBody');
    const userInput = document.getElementById('userInput');
    let orderData = { status: "idle", produk: "", idUser: "" };
    let lang = 'id';

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            container.style.height = window.visualViewport.height + 'px';
            chatBody.scrollTop = chatBody.scrollHeight;
        });
    }

    function changeLang(l, btn) {
        lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(chatBody.children.length === 1) {
            document.getElementById('msgHalo').innerText = (lang === 'id' ? 'Halo lek! Ketik "menu" buat lihat daftar game & mulai order ya!' : 'Hello friend! Type "menu" to see the game list & start your order!');
        }
    }

    function generateNomor(prefix) {
        let num = prefix;
        for (let i = 0; i < 8; i++) num += Math.floor(Math.random() * 10);
        return num;
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('statusTime').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }, 1000);

    if (navigator.getBattery) {
        navigator.getBattery().then(function(battery) {
            function updateBattery() { document.getElementById('batteryStatus').innerText = Math.round(battery.level * 100) + "%"; }
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
        });
    }

    function buatBubble(text, isUser) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isUser ? 'user' : 'bot');
        div.innerHTML = text;
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    document.getElementById('btnKirim').onclick = function() {
        const text = userInput.value;
        if (!text) return;
        buatBubble(text, true);
        userInput.value = '';
        
        // Teks "Sedang mengetik" dinamis berdasarkan bahasa
        const typingText = lang === 'id' ? '<i>NEXUS sedang mengetik...</i>' : '<i>NEXUS is typing...</i>';
        buatBubble(typingText, false);
        
        const typing = chatBody.lastChild;
        setTimeout(()=>{
            typing.remove();
            const input = text.toLowerCase();
            
            if (input.includes('udah pembayaran') || input.includes('payment made') || (orderData.status === "konfirmasi" && (input.includes('bayar') || input.includes('paid')))) {
                let msg = lang === 'id' ? "✅ **PEMBAYARAN SUKSES!**\n\nSelamat lek! Diamond-nya sudah masuk ke ID kamu. Semoga makin wangi spin skin impian kamu ya lek! Dan sehat selalu dan rezeki nya bertambah ya lek.\n\nApakah mau ber-top up lagi? Kalau mau, ketik 'menu' ya lek!" : "✅ **PAYMENT SUCCESS!**\n\nCongratulations! The diamonds have been sent to your ID. Hope you get your dream skin! Stay healthy and prosper.\n\nWant to top up again? Type 'menu'.";
                buatBubble(msg, false);
                orderData.status = "idle";
                return;
            }

            if (orderData.status === "pilih_metode") {
                let kataBayar = (lang === 'id' ? "sudah pembayaran" : "payment made");
                
                if (input.includes('e-wallet') || input.includes('wallet')) {
                    buatBubble(lang === 'id' ? "Silakan transfer ke nomor E-Wallet Admin (DANA/OVO/GOPAY): **" + generateNomor("08") + "**\n\nJika sudah transfer, ketik **" + kataBayar + "** ya lek!" : "Please transfer to the Admin E-Wallet number (DANA/OVO/GOPAY): **" + generateNomor("08") + "**\n\nIf you have transferred, type **" + kataBayar + "**:", false);
                    orderData.status = "konfirmasi";
                } else if (input.includes('bank') || input.includes('transfer')) {
                    buatBubble(lang === 'id' ? "Silakan transfer ke nomor Rekening Bank Admin (BCA/Mandiri/BRI): **" + generateNomor("12") + "**\n\nJika sudah transfer, ketik **" + kataBayar + "** ya lek!" : "Please transfer to the Admin Bank Account (BCA/Mandiri/BRI): **" + generateNomor("12") + "**\n\nIf you have transferred, type **" + kataBayar + "**:", false);
                    orderData.status = "konfirmasi";
                } else if (input.includes('qris') || input.includes('qr')) {
                    let img = "<br><img src='qrcode_373125598_ac3558ad6cc983de7f62918832b4b424.png' style='width:150px; height:150px; border:4px solid #fff; border-radius:8px;'><br>";
                    buatBubble(lang === 'id' ? "Scan QRIS Admin berikut untuk pembayaran:" + img + "Jika sudah transfer, ketik **" + kataBayar + "** ya lek!" : "Scan the following QRIS for payment:" + img + "If you have transferred, type **" + kataBayar + "**:", false);
                    orderData.status = "konfirmasi";
                } else {
                    buatBubble(lang === 'id' ? "Pilih metode yang benar lek:\n- E-Wallet\n- Transfer Bank\n- QRIS" : "Please choose the correct method:\n- E-Wallet\n- Transfer Bank\n- QRIS", false);
                }
                return;
            }

            if (orderData.status === "menunggu_id") {
                orderData.idUser = text;
                orderData.status = "pilih_metode";
                buatBubble(lang === 'id' ? "ID & Server tersimpan: " + text + "\n\nSilakan pilih Metode Pembayaran:\n- E-Wallet\n- Transfer Bank\n- QRIS" : "ID & Server saved: " + text + "\n\nPlease choose a Payment Method:\n- E-Wallet\n- Transfer Bank\n- QRIS", false);
                return;
            }

            if (orderData.status === "pilih_nominal") {
                orderData.produk = text;
                orderData.status = "menunggu_id";
                buatBubble(lang === 'id' ? "Pilihan '" + text + "' tersimpan.\n\nSekarang masukkan ID & Server ID kamu lek:" : "Selection '" + text + "' saved.\n\nNow enter your User ID & Server ID:", false);
                return;
            }

            if (input.includes('menu')) {
                orderData.status = "pilih_game";
                buatBubble(lang === 'id' ? "Katalog Game NEXUS CORP:\n- ML (Mobile Legends)\n- FF (Free Fire)\n- PUBG\n\nKetik nama game pilihanmu lek:" : "NEXUS CORP Game Catalog:\n- ML (Mobile Legends)\n- FF (Free Fire)\n- PUBG\n\nType your chosen game name:", false);
            } else if (orderData.status === "pilih_game" || input === 'ml' || input === 'ff' || input === 'pubg') {
                orderData.status = "pilih_nominal";
                let daftarHarga = "";
                if (lang === 'id') {
                    if (input.includes('ml')) daftarHarga = "Katalog Harga ML:\n- Weekly Diamond Pass (Rp 27.000)\n- 86 Diamonds (Rp 20.000)";
                    else if (input.includes('ff')) daftarHarga = "Katalog Harga FF:\n- 140 Diamonds (Rp 20.000)\n- 355 Diamonds (Rp 50.000)";
                    else daftarHarga = "Katalog Harga PUBG:\n- 60 UC (Rp 15.000)\n- 325 UC (Rp 70.000)";
                } else {
                    if (input.includes('ml')) daftarHarga = "ML Price List:\n- Weekly Diamond Pass (Rp 27.000)\n- 86 Diamonds (Rp 20.000)";
                    else if (input.includes('ff')) daftarHarga = "FF Price List:\n- 140 Diamonds (Rp 20.000)\n- 355 Diamonds (Rp 50.000)";
                    else daftarHarga = "PUBG Price List:\n- 60 UC (Rp 15.000)\n- 325 UC (Rp 70.000)";
                }
                buatBubble(daftarHarga + "\n\n" + (lang === 'id' ? "Ketik pilihan paket yang kamu inginkan:" : "Type the package you want:"), false);
            } else {
                buatBubble(lang === 'id' ? "Waduh lek, ketik **menu** buat lihat katalog game ya!" : "Oops, type **menu** to see the game catalog!", false);
            }
        },800);
    };
    userInput.focus();
</script>
</body>
</html>
